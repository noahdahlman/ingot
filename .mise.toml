[settings]
experimental = true

[tools]
bun = "latest"
rust = "latest"
uv = "latest"
conan = "latest"
meson = "latest"
ninja = "latest"

[env]
CC = "clang"
CXX = "clang++"

[tasks.setup]
description = "Install dependencies and configure the build"
run = "conan install . -pr conan_clang_profile -of build --build=missing"

[tasks.build]
description = "Build the project"
depends = ["setup"]
run = "conan build . -pr conan_clang_profile -of build"

[tasks.test]
description = "Run C++ unit tests"
depends = ["build"]
run = "meson test -C build -v"

[tasks."test:viem"]
description = "Run viem cross-validation"
depends = ["build"]
dir = "tests/viem_compare"
run = ["bun install", "bun run compare.ts"]

[tasks."test:alloy"]
description = "Run alloy cross-validation"
depends = ["build"]
dir = "tests/alloy_compare"
run = "cargo run -- ../../build/tests/test_cross_validate"

[tasks."test:all"]
description = "Run all tests including cross-validation"
depends = ["test", "test:viem", "test:alloy"]
